services:
  # Backend Service (FastAPI)
  - type: web
    name: backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        # You will be prompted for this value in the Render dashboard during deployment
        value: "postgresql://user:password@host/dbname?sslmode=require"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        fromService:
          name: frontend
          type: web
          property: host

  # Frontend Service (Next.js)
  - type: web
    name: frontend
    plan: free
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: backend
          type: web
          property: host
